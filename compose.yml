services:
  tunnel:
    build: 
      context: .
      args:
        # What's the username+password people will use to go through first-time registration on your server?
        NEW_USER_LOGIN: new-user
        NEW_USER_PASSWORD: login
        # What's the username that will allow registered people to access the TUI app?
        APP_USER_LOGIN: app
        # What's the forward-deployed hostname/port pair for the app? Used for error messages and instructions
        APP_DEPLOYED_HOSTPORT: localhost:1337
        # Add a public key to the .env file to enable root access to the container.
        ROOT_TRUSTED_KEY: ${DOCKER_ROOT_TRUSTED_KEY}
    volumes:
      # Give the tunnel container access to the host docker service to allow it to spin up new containers
      - "/var/run/docker.sock:/var/run/docker.sock:rw"
    ports:
      - 1337:22

  # This compose entry is for your app!
  # app:
  #   build:
  #     context: app/

